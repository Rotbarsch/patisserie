<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <!--
      Corner ornament with (0,0) at the frame-line junction.
      Arms extend 75 units to reach the slice boundary at offset 90
      (junction is at 15, so 15 + 75 = 90).
      All strokes white so alpha-mode mask-border uses them as opaque regions.
    -->
    <g id="c" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="1.5" fill="white" stroke="none"/>
      <!-- Arms: run from junction to the 90px slice boundary -->
      <line x1="0" y1="0" x2="75" y2="0" stroke-width="0.75" stroke-linecap="butt"/>
      <line x1="0" y1="0" x2="0" y2="75" stroke-width="0.75" stroke-linecap="butt"/>
      <!-- Main baroque volute -->
      <path stroke-width="0.9"
            d="M 50,3
               C 62,3 68,20 62,36
               C 56,52 40,60 24,56
               C 8,52 2,38 6,24
               C 10,10 22,4 34,8
               C 46,12 50,26 44,36
               C 38,46 24,48 14,42
               C 4,36 4,22 12,16
               C 20,10 32,12 34,22
               C 36,32 28,38 20,34"/>
      <!-- Tendril at volute tip -->
      <path stroke-width="0.75" d="M 20,34 C 16,40 20,46 26,42"/>
      <!-- Terminal curl at horizontal arm end -->
      <path stroke-width="0.8" d="M 52,1 C 57,-1 63,5 59,12 C 55,18 48,14 50,7"/>
      <!-- Terminal curl at vertical arm end -->
      <path stroke-width="0.8" d="M 1,52 C -1,57 5,63 12,59 C 18,55 14,48 7,50"/>
      <!-- Leaf accents along horizontal arm -->
      <path stroke-width="0.7" d="M 26,0 C 22,6 17,5 19,1"/>
      <path stroke-width="0.7" d="M 36,0 C 32,6 27,5 29,1"/>
      <!-- Leaf accents along vertical arm -->
      <path stroke-width="0.7" d="M 0,26 C 6,22 5,17 1,19"/>
      <path stroke-width="0.7" d="M 0,36 C 6,32 5,27 1,29"/>
    </g>
  </defs>

  <!-- TL: junction at (15,15) -->
  <use href="#c" transform="translate(15,15)"/>

  <!-- TR: junction at (285,15), reflected horizontally -->
  <use href="#c" transform="translate(285,15) scale(-1,1)"/>

  <!-- BL: junction at (15,285), reflected vertically -->
  <use href="#c" transform="translate(15,285) scale(1,-1)"/>

  <!-- BR: junction at (285,285), reflected both axes -->
  <use href="#c" transform="translate(285,285) scale(-1,-1)"/>

  <!--
    Edge center lines — these slices get stretched by mask-border to fill the
    element width/height. A plain line is distortion-free under stretching.
  -->
  <line x1="90" y1="15"  x2="210" y2="15"  stroke="white" stroke-width="0.75" stroke-linecap="butt"/>
  <line x1="90" y1="285" x2="210" y2="285" stroke="white" stroke-width="0.75" stroke-linecap="butt"/>
  <line x1="15" y1="90"  x2="15"  y2="210" stroke="white" stroke-width="0.75" stroke-linecap="butt"/>
  <line x1="285" y1="90" x2="285" y2="210" stroke="white" stroke-width="0.75" stroke-linecap="butt"/>
</svg>
