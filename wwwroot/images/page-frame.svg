<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"
     fill="none" stroke="#c9a882" stroke-linecap="round" stroke-linejoin="round">

  <!--
    Sliced at 80px from each edge (border-image-slice: 80).
    Each 80×80 corner zone contains the baroque scroll ornament.
    Each edge zone (80–220) contains a single thin frame line at offset 10.
    The corner frame lines sit at x=10 / y=10 within each corner zone,
    meeting the edge lines exactly — zero alignment gap.
  -->

  <!-- ╔══ TL corner ══╗ (zone 0–80, 0–80) -->
  <g id="tl">
    <!-- Frame lines inside this zone, running to the zone edges -->
    <line x1="10" y1="10" x2="80" y2="10" stroke-width="0.75"/>
    <line x1="10" y1="10" x2="10" y2="80" stroke-width="0.75"/>
    <circle cx="10" cy="10" r="2" fill="#c9a882" stroke="none"/>

    <!-- Scroll A – large, upper-right of cluster -->
    <path d="M54,14 C46,10 36,12 36,22 C36,33 46,35 52,27 C58,19 50,12 43,17 C36,22 37,32 44,32"
          stroke-width="0.85"/>

    <!-- Scroll B – medium, centre -->
    <path d="M32,24 C24,19 16,24 16,34 C16,45 27,47 31,39 C35,31 27,23 20,29 C13,35 15,45 22,45"
          stroke-width="0.85"/>

    <!-- Scroll C – small, lower-left -->
    <path d="M16,49 C12,46 10,53 12,59 C14,65 21,66 23,59 C25,53 19,49 16,54 C13,59 15,65 19,65"
          stroke-width="0.85"/>

    <!-- Leaf accents -->
    <path d="M40,13 C36,11 30,13 33,19" stroke-width="0.8"/>
    <path d="M21,29 C17,24 12,28 14,34" stroke-width="0.8"/>
    <path d="M13,54 C11,51 11,57 14,59" stroke-width="0.8"/>

    <!-- Tendrils -->
    <path d="M53,20 C60,17 62,24 57,27" stroke-width="0.8"/>
    <path d="M17,63 C14,69 17,73 22,71" stroke-width="0.8"/>
  </g>

  <!-- ╗ TR corner (mirror TL horizontally) -->
  <g transform="translate(300,0) scale(-1,1)">
    <line x1="10" y1="10" x2="80" y2="10" stroke-width="0.75"/>
    <line x1="10" y1="10" x2="10" y2="80" stroke-width="0.75"/>
    <circle cx="10" cy="10" r="2" fill="#c9a882" stroke="none"/>
    <path d="M54,14 C46,10 36,12 36,22 C36,33 46,35 52,27 C58,19 50,12 43,17 C36,22 37,32 44,32" stroke-width="0.85"/>
    <path d="M32,24 C24,19 16,24 16,34 C16,45 27,47 31,39 C35,31 27,23 20,29 C13,35 15,45 22,45" stroke-width="0.85"/>
    <path d="M16,49 C12,46 10,53 12,59 C14,65 21,66 23,59 C25,53 19,49 16,54 C13,59 15,65 19,65" stroke-width="0.85"/>
    <path d="M40,13 C36,11 30,13 33,19" stroke-width="0.8"/>
    <path d="M21,29 C17,24 12,28 14,34" stroke-width="0.8"/>
    <path d="M13,54 C11,51 11,57 14,59" stroke-width="0.8"/>
    <path d="M53,20 C60,17 62,24 57,27" stroke-width="0.8"/>
    <path d="M17,63 C14,69 17,73 22,71" stroke-width="0.8"/>
  </g>

  <!-- ╚ BL corner (mirror TL vertically) -->
  <g transform="translate(0,300) scale(1,-1)">
    <line x1="10" y1="10" x2="80" y2="10" stroke-width="0.75"/>
    <line x1="10" y1="10" x2="10" y2="80" stroke-width="0.75"/>
    <circle cx="10" cy="10" r="2" fill="#c9a882" stroke="none"/>
    <path d="M54,14 C46,10 36,12 36,22 C36,33 46,35 52,27 C58,19 50,12 43,17 C36,22 37,32 44,32" stroke-width="0.85"/>
    <path d="M32,24 C24,19 16,24 16,34 C16,45 27,47 31,39 C35,31 27,23 20,29 C13,35 15,45 22,45" stroke-width="0.85"/>
    <path d="M16,49 C12,46 10,53 12,59 C14,65 21,66 23,59 C25,53 19,49 16,54 C13,59 15,65 19,65" stroke-width="0.85"/>
    <path d="M40,13 C36,11 30,13 33,19" stroke-width="0.8"/>
    <path d="M21,29 C17,24 12,28 14,34" stroke-width="0.8"/>
    <path d="M13,54 C11,51 11,57 14,59" stroke-width="0.8"/>
    <path d="M53,20 C60,17 62,24 57,27" stroke-width="0.8"/>
    <path d="M17,63 C14,69 17,73 22,71" stroke-width="0.8"/>
  </g>

  <!-- ╝ BR corner (rotate 180°) -->
  <g transform="translate(300,300) scale(-1,-1)">
    <line x1="10" y1="10" x2="80" y2="10" stroke-width="0.75"/>
    <line x1="10" y1="10" x2="10" y2="80" stroke-width="0.75"/>
    <circle cx="10" cy="10" r="2" fill="#c9a882" stroke="none"/>
    <path d="M54,14 C46,10 36,12 36,22 C36,33 46,35 52,27 C58,19 50,12 43,17 C36,22 37,32 44,32" stroke-width="0.85"/>
    <path d="M32,24 C24,19 16,24 16,34 C16,45 27,47 31,39 C35,31 27,23 20,29 C13,35 15,45 22,45" stroke-width="0.85"/>
    <path d="M16,49 C12,46 10,53 12,59 C14,65 21,66 23,59 C25,53 19,49 16,54 C13,59 15,65 19,65" stroke-width="0.85"/>
    <path d="M40,13 C36,11 30,13 33,19" stroke-width="0.8"/>
    <path d="M21,29 C17,24 12,28 14,34" stroke-width="0.8"/>
    <path d="M13,54 C11,51 11,57 14,59" stroke-width="0.8"/>
    <path d="M53,20 C60,17 62,24 57,27" stroke-width="0.8"/>
    <path d="M17,63 C14,69 17,73 22,71" stroke-width="0.8"/>
  </g>

  <!-- Edge lines: sit at offset 10 inside each edge zone, matching the corner lines -->
  <line x1="80"  y1="10"  x2="220" y2="10"  stroke-width="0.75"/>  <!-- top    -->
  <line x1="80"  y1="290" x2="220" y2="290" stroke-width="0.75"/>  <!-- bottom -->
  <line x1="10"  y1="80"  x2="10"  y2="220" stroke-width="0.75"/>  <!-- left   -->
  <line x1="290" y1="80"  x2="290" y2="220" stroke-width="0.75"/>  <!-- right  -->

</svg>
